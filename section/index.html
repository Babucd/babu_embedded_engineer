<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Video Animation</title>
  </head>
  <body>
    <div id="split-layout">
      <div id="left-screen">
        <video id="scroll-video" muted playsinline preload="auto">
          <source src="/video1.mp4" type="video/mp4" />
        </video>
      </div>
      <div id="right-screen">
        <div class="content-wrapper">
          <h1 class="title">The Future of 3D</h1>
          <p class="description">
            Scroll down to watch the animation unfold. Experience a seamless and immersive cinematic journey.
          </p>
          <div class="scroll-indicator">↓ Scroll to explore ↓</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
